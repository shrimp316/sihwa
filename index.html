<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글빛을 모아 담다 시화 詩和</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="시화 詩和">
<link rel="apple-touch-icon" href="icon-512x512.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-512x512.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-192x192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#fdf8f0;--cream2:#fdf4e7;--tan:#f0e4cc;
  --gold:#c8a06a;--gold-d:#9a7040;
  --ink:#3a2e1e;--ink-mid:#6b5a42;--ink-lite:#a08060;
  --spine:#d4b98a;--border:#e0ceaa;--shadow:rgba(100,70,30,0.12);
  --edit-bg:#1e1a14;--edit-panel:#2a2318;--edit-border:#4a3e2e;
  --edit-gold:#c8a06a;--edit-text:#e8d8b8;
}
html{font-size:16px;}
body{background:var(--tan);font-family:'Noto Serif KR',serif;min-height:100vh;overflow-x:hidden;color:var(--ink);user-select:none;}

#loading{position:fixed;inset:0;background:var(--cream2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s;}
#loading .load-title{font-size:1.4rem;font-weight:400;color:var(--ink-mid);letter-spacing:0.15em;margin-bottom:1.5rem;}
.load-dots{display:flex;gap:8px;}
.load-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bounce 1.2s ease-in-out infinite;}
.load-dots span:nth-child(2){animation-delay:0.2s;}
.load-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
#loading.hidden{opacity:0;pointer-events:none;}

#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:var(--cream2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;z-index:100;gap:0.8rem;}
.tb-title{font-size:0.85rem;font-weight:500;color:var(--ink);letter-spacing:0.12em;flex:1;}
.tb-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--ink-lite);background:none;border:0.5px solid var(--border);padding:5px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s;letter-spacing:0.06em;}
.tb-btn:hover{background:var(--tan);color:var(--ink);}
.tb-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}

#main{padding-top:50px;min-height:100vh;display:flex;flex-direction:column;align-items:center;}

#cover{min-height:calc(100vh - 50px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;}
.cover-ornament{font-size:1.5rem;color:var(--gold);letter-spacing:0.4em;margin-bottom:2.5rem;}
.cover-main-title{font-size:2.6rem;font-weight:300;color:var(--ink);letter-spacing:0.06em;line-height:1.3;margin-bottom:1.2rem;}
.cover-poets{font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--ink-lite);letter-spacing:0.2em;margin-bottom:3rem;line-height:2;}
.cover-year{font-size:0.72rem;color:var(--spine);letter-spacing:0.25em;font-family:'Noto Sans KR',sans-serif;margin-bottom:3rem;}
.cover-start-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--ink-mid);background:none;border:0.5px solid var(--border);padding:10px 28px;border-radius:24px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.cover-start-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--ink);}

#toc-view{width:100%;max-width:680px;padding:3rem 2rem 4rem;display:none;}
#toc-view.active{display:block;}
.toc-header{font-size:0.72rem;letter-spacing:0.2em;color:var(--ink-lite);text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);}
.toc-quarter{margin-bottom:2.5rem;}
.toc-quarter-label{font-size:1rem;font-weight:400;color:var(--ink);letter-spacing:0.06em;margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:0.5px solid var(--border);}
.toc-quarter-num{font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;color:var(--gold);letter-spacing:0.2em;display:block;margin-bottom:0.3rem;}
.toc-round{margin-bottom:1.2rem;margin-left:0.5rem;}
.toc-round-label{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;color:var(--gold);letter-spacing:0.15em;margin-bottom:0.5rem;}
.toc-item{display:flex;align-items:baseline;padding:0.45rem 0;border-bottom:0.5px solid var(--border);cursor:pointer;gap:12px;transition:all 0.15s;}
.toc-item:hover{padding-left:8px;}
.toc-item:hover .toc-item-title{color:var(--ink);}
.toc-item-title{flex:1;font-size:0.88rem;color:var(--ink-mid);line-height:1.4;}
.toc-item-poet{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:var(--ink-lite);}

#book-view{display:none;width:100%;padding-bottom:5rem;}
#book-view.active{display:block;}

.quarter-page{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:0.5px solid var(--border);padding:4rem 2rem;text-align:center;position:relative;}
.quarter-page::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;border:0.5px solid var(--border);pointer-events:none;}
.quarter-page-num{font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;color:var(--gold);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:1rem;}
.quarter-page-title{font-size:2.2rem;font-weight:300;color:var(--ink);letter-spacing:0.06em;}

.round-page{min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:0.5px solid var(--border);padding:3.5rem 2rem;text-align:center;}
.round-page-num{font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;color:var(--spine);letter-spacing:0.2em;margin-bottom:0.8rem;}
.round-page-title{font-size:1.6rem;font-weight:300;color:var(--ink-mid);letter-spacing:0.05em;}

.poem-entry{max-width:640px;margin:0 auto;padding:4.5rem 2rem 4rem;border-bottom:0.5px solid var(--border);}
.poem-entry-poet{font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.7rem;}
.poem-entry-title{font-size:1.4rem;font-weight:400;color:var(--ink);margin-bottom:1.6rem;line-height:1.3;}
.poem-entry-divider{width:24px;height:0.5px;background:var(--spine);margin-bottom:1.6rem;}
.poem-entry-body{font-size:0.95rem;color:var(--ink-mid);line-height:2.2;white-space:pre-line;font-weight:300;}

#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--cream2);border-top:1px solid var(--border);display:none;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;}
#bottom-nav.active{display:flex;}
.bnav-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;color:var(--ink-lite);background:none;border:none;cursor:pointer;padding:8px 16px;transition:color 0.15s;}
.bnav-btn:disabled{opacity:0.3;cursor:default;}
.bnav-btn:not(:disabled):hover{color:var(--ink);}
#page-indicator{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:var(--ink-lite);letter-spacing:0.08em;text-align:center;min-width:120px;line-height:1.5;}

#page-turn-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;}
.flip-sheet{position:absolute;inset:0;background:var(--cream2);transform-origin:left center;opacity:0;border-right:1px solid var(--border);}

body.edit-mode{background:var(--edit-bg);}
body.edit-mode #topbar{background:var(--edit-panel);border-color:var(--edit-border);}
body.edit-mode .tb-title{color:var(--edit-gold);}

#edit-panel{display:none;width:100%;max-width:760px;margin:0 auto;padding:2rem 1.5rem 5rem;}
#edit-panel.active{display:block;}

.edit-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:0.5px solid var(--edit-border);}
.edit-tab{font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;color:#7a6a50;background:none;border:none;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;letter-spacing:0.06em;}
.edit-tab.active{color:var(--edit-gold);border-bottom-color:var(--edit-gold);}
.edit-tab-content{display:none;}
.edit-tab-content.active{display:block;}

.edit-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.edit-section-title{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--edit-gold);letter-spacing:0.15em;text-transform:uppercase;}
.edit-add-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--edit-bg);background:var(--edit-gold);border:none;padding:7px 16px;border-radius:16px;cursor:pointer;transition:opacity 0.15s;}
.edit-add-btn:hover{opacity:0.85;}

.edit-card{background:var(--edit-panel);border:0.5px solid var(--edit-border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.edit-card-info{flex:1;min-width:0;}
.edit-card-title{font-size:0.9rem;color:var(--edit-text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.edit-card-sub{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:var(--edit-gold);letter-spacing:0.08em;}
.edit-card-preview{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:#7a6a50;margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.edit-card-actions{display:flex;gap:6px;flex-shrink:0;}
.ecard-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;background:none;border:0.5px solid var(--edit-border);color:var(--edit-text);padding:5px 10px;border-radius:12px;cursor:pointer;transition:all 0.15s;}
.ecard-btn.del{color:#c06060;border-color:#5a3030;}
.ecard-btn:hover{background:var(--edit-border);}
.ecard-btn.del:hover{background:#3a2020;}

.edit-group{margin-bottom:2rem;}
.edit-group-label{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;color:#7a6a50;letter-spacing:0.12em;margin-bottom:0.7rem;padding-bottom:0.4rem;border-bottom:0.5px solid var(--edit-border);}
.edit-group-label span{color:var(--edit-gold);}

.firebase-notice{background:var(--edit-panel);border:0.5px solid var(--edit-border);border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;color:#7a6a50;line-height:1.8;}
.firebase-notice strong{color:var(--edit-gold);}
.firebase-notice code{background:var(--edit-bg);border:0.5px solid var(--edit-border);border-radius:3px;padding:1px 5px;font-size:0.72rem;color:#a09070;}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-backdrop.hidden{display:none;}
.modal-box{background:var(--edit-panel);border:0.5px solid var(--edit-border);border-radius:12px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--edit-gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.5rem;}
.form-group{margin-bottom:1.1rem;}
.form-label{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:#7a6a50;letter-spacing:0.1em;display:block;margin-bottom:0.4rem;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--edit-bg);border:0.5px solid var(--edit-border);color:var(--edit-text);border-radius:6px;padding:9px 12px;font-family:'Noto Serif KR',serif;font-size:0.85rem;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--edit-gold);}
.form-textarea{resize:vertical;min-height:200px;line-height:1.9;}
.form-select option,.form-select optgroup{background:var(--edit-bg);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;}
.modal-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;padding:8px 20px;border-radius:16px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;}
.modal-btn.cancel{background:none;border:0.5px solid var(--edit-border);color:#7a6a50;}
.modal-btn.confirm{background:var(--edit-gold);border:none;color:var(--edit-bg);}
.modal-btn:hover{opacity:0.85;}

#pw-modal .modal-box{background:var(--cream2);border-color:var(--border);}
#pw-modal .modal-title{color:var(--ink-mid);}
#pw-modal .form-input{background:var(--cream);border-color:var(--border);color:var(--ink);font-family:'Noto Sans KR',sans-serif;}
#pw-modal .modal-btn.confirm{background:var(--ink);color:var(--cream);}
#pw-modal .modal-btn.cancel{color:var(--ink-lite);border-color:var(--border);}
.pw-error{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:#c06060;margin-top:0.5rem;display:none;}
.pw-error.show{display:block;}

.end-page{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;}
.end-ornament{font-size:1.5rem;color:var(--gold);margin-bottom:1.5rem;}
.end-title{font-size:1.4rem;font-weight:300;color:var(--ink-mid);margin-bottom:0.5rem;}
.end-sub{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;color:var(--ink-lite);letter-spacing:0.15em;}
.swipe-hint{text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;color:var(--ink-lite);letter-spacing:0.12em;padding:1rem;opacity:0.6;}
/* 보기 전환 버튼 */
.view-toggle{display:flex;gap:6px;justify-content:center;padding:1.2rem 0 0.4rem;}
.view-toggle-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:var(--ink-lite);background:none;border:0.5px solid var(--border);padding:5px 14px;border-radius:14px;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em;}
.view-toggle-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
/* 페이지 뷰 */
#page-view{display:none;width:100%;min-height:calc(100vh - 106px);overflow:hidden;}
#page-view.active{display:block;}
#page-card-container{min-height:calc(100vh - 106px);display:flex;align-items:center;justify-content:center;}
.page-card{width:100%;min-height:calc(100vh - 106px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center;background:var(--cream2);animation:fadeInCard 0.35s ease;}
@keyframes fadeInCard{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.page-card-type{font-family:'Noto Sans KR',sans-serif;font-size:0.62rem;color:var(--gold);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:0.8rem;}
.page-card-title{font-size:1.6rem;font-weight:300;color:var(--ink);line-height:1.3;margin-bottom:0.5rem;}
.page-card-poet{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--ink-lite);letter-spacing:0.12em;margin-bottom:1.6rem;}
.page-card-divider{width:24px;height:0.5px;background:var(--spine);margin:0 auto 1.6rem;}
.page-card-body{font-size:0.92rem;color:var(--ink-mid);line-height:2.2;white-space:pre-line;font-weight:300;max-width:520px;}
.page-card-intro{font-size:0.88rem;color:var(--ink-lite);line-height:2.0;white-space:pre-line;font-weight:300;font-style:italic;max-width:460px;}
.page-card-quarter-num{font-family:'Noto Sans KR',sans-serif;font-size:0.62rem;color:var(--gold);letter-spacing:0.22em;margin-bottom:0.6rem;}
.page-card-quarter-title{font-size:2rem;font-weight:300;color:var(--ink);margin-bottom:1rem;}
.page-card-round-num{font-family:'Noto Sans KR',sans-serif;font-size:0.62rem;color:var(--spine);letter-spacing:0.2em;margin-bottom:0.6rem;}
.page-card-round-title{font-size:1.4rem;font-weight:300;color:var(--ink-mid);}
.page-counter{font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;color:var(--ink-lite);letter-spacing:0.1em;}
.empty-state{text-align:center;padding:3rem 1rem;font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:#7a6a50;line-height:2;}
/* ── 갤러리 ── */
#gallery-view{display:none;width:100%;max-width:760px;padding:2.5rem 1.5rem 6rem;}
#gallery-view.active{display:block;}
.gallery-quarter{margin-bottom:3rem;}
.gallery-quarter-label{font-size:0.72rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;margin-bottom:1.2rem;padding-bottom:0.6rem;border-bottom:0.5px solid var(--border);}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;}
.gallery-card{background:var(--cream2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.gallery-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow);}
.gallery-card-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--tan);display:flex;align-items:center;justify-content:center;}
.gallery-card-img img{width:100%;height:100%;object-fit:cover;}
.gallery-card-img-placeholder{width:100%;aspect-ratio:4/3;background:var(--tan);display:flex;align-items:center;justify-content:center;color:var(--ink-lite);font-size:0.75rem;font-family:'Noto Sans KR',sans-serif;}
.gallery-card-body{padding:1rem 1.1rem;}
.gallery-card-title{font-size:0.9rem;color:var(--ink);margin-bottom:0.4rem;line-height:1.3;}
.gallery-card-tag{display:inline-block;font-family:'Noto Sans KR',sans-serif;font-size:0.62rem;color:var(--gold-d);background:var(--tan);border-radius:10px;padding:2px 8px;margin-bottom:0.5rem;}
.gallery-card-note{font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;color:var(--ink-mid);line-height:1.7;white-space:pre-line;}
/* 갤러리 라이트박스 */
#gallery-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
#gallery-lightbox.active{display:flex;}
#lb-img{max-width:90vw;max-height:60vh;object-fit:contain;border-radius:8px;margin-bottom:1.2rem;}
#lb-title{font-size:1rem;color:#fff;margin-bottom:0.4rem;text-align:center;}
#lb-tag{font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;color:var(--gold);letter-spacing:0.12em;margin-bottom:0.8rem;text-align:center;}
#lb-note{font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:#ccc;line-height:1.8;text-align:center;max-width:520px;white-space:pre-line;}
#lb-close{position:absolute;top:1.2rem;right:1.5rem;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;opacity:0.7;}
#lb-close:hover{opacity:1;}
/* 갤러리 편집 */
.gallery-type-badge{display:inline-block;font-family:'Noto Sans KR',sans-serif;font-size:0.62rem;padding:2px 8px;border-radius:10px;margin-left:6px;}
.badge-illust{background:#e8f0e0;color:#5a7a40;}
.badge-bg{background:#e0e8f0;color:#405a7a;}
.badge-etc{background:#f0e8e0;color:#7a5a40;}
/* 업로드 progress */
.upload-progress{margin-top:0.6rem;font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--edit-gold);}
@media(max-width:600px){.gallery-grid{grid-template-columns:1fr;}}
.filter-bar{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;}
.filter-select{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--edit-text);background:var(--edit-bg);border:0.5px solid var(--edit-border);border-radius:16px;padding:6px 12px;outline:none;cursor:pointer;transition:border-color 0.15s;}
.filter-select:focus{border-color:var(--edit-gold);}
.filter-select option{background:var(--edit-bg);}
.quarter-intro{max-width:580px;margin:0 auto;padding:0 2rem 4rem;text-align:center;}

<script>
/* ═══════════════════════════
   FIREBASE CONFIG — 여기 수정
   ═══════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAeyy13dfbzKDCfzKhsrVNnQtOvEwFsLes",
  authDomain: "sihwa-eeec9.firebaseapp.com",
  projectId: "sihwa-eeec9",
  storageBucket: "sihwa-eeec9.firebasestorage.app",
  messagingSenderId: "339102864437",
  appId: "1:339102864437:web:5590d4ec85f1cba5b90d7c"
};
const EDIT_PASSWORD = "tlghk2026";

/* ═══════════════════════════
   FIREBASE INIT
   ═══════════════════════════ */
let db = null, storage = null, firebaseReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });
  storage = firebase.storage();
  firebaseReady = true;
} catch(e) { console.warn("Firebase 미연결 — 샘플 데이터로 실행", e); }

/* ═══════════════════════════
   SNAPSHOT (빠른 초기 렌더용)
   ═══════════════════════════ */
const SNAPSHOT_KEY = 'sihwa_snapshot';
function loadSnapshot() {
  try { const r=localStorage.getItem(SNAPSHOT_KEY); return r?JSON.parse(r):null; } catch(e){ return null; }
}
function saveSnapshot() {
  try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify({quarters,rounds,poems,freePoems,ts:Date.now()})); } catch(e){}
}

/* ═══════════════════════════
   SAMPLE DATA
   ═══════════════════════════ */
const SAMPLE = {
  quarters: [
    { id:'q1', title:'계절', order:0 },
    { id:'q2', title:'관계', order:1 },
  ],
  rounds: [
    { id:'r1', title:'봄', num:1, quarterId:'q1', order:0 },
    { id:'r2', title:'여름', num:2, quarterId:'q1', order:1 },
    { id:'r3', title:'처음', num:3, quarterId:'q2', order:0 },
    { id:'r4', title:'이별', num:4, quarterId:'q2', order:1 },
  ],
  poems: [
    { id:'p1', roundId:'r1', poet:'김하늘', title:'봄의 기억', order:0,
      body:`봄이 오면 나는 늘\n창문 하나를 더 열어두었다\n\n바람이 커튼을 밀어내고\n그 틈으로 햇빛이 들어와\n방 안 가득 쌓인 먼지들을\n하나씩 들어 올리던 날\n\n너는 그 먼지들 사이에 있었다`},
    { id:'p2', roundId:'r1', poet:'이서준', title:'연두색 오후', order:1,
      body:`연두색이 번지던 오후\n나는 창가에 앉아\n아무것도 하지 않았다\n\n그게 가장 봄다운 일이었다`},
    { id:'p3', roundId:'r2', poet:'박지유', title:'여름 끝에서', order:0,
      body:`여름은 늘 너무 갑자기 끝난다\n분명 뜨거웠는데\n어느 날 보면 이미 식어있어\n\n우리가 그랬던 것처럼`},
    { id:'p4', roundId:'r3', poet:'최민아', title:'처음 본 얼굴', order:0,
      body:`처음 본 얼굴인데\n어딘가 낯이 익었다\n\n아마도 내가 오래\n기다려온 얼굴이라서`},
    { id:'p5', roundId:'r4', poet:'정우찬', title:'이별의 문법', order:0,
      body:`이별에도 문법이 있다면\n주어는 언제나 둘이고\n동사는 언제나 하나다\n\n우리는 같은 문장을\n다른 시제로 읽었다`},
  ],
  freePoems: [
    { id:'f1', quarterId:'q1', poet:'오하린', title:'여백', order:0,
      body:'아무것도 쓰지 않은 페이지가\n가장 많은 말을 한다' },
  ]
};

/* ═══════════════════════════
   STATE
   ═══════════════════════════ */
let quarters = [], rounds = [], poems = [], freePoems = [], galleryItems = [];
let currentView = 'cover', editMode = false, activeTab = 'quarters';
let editingQuarterId = null, editingRoundId = null, editingPoemId = null;
let deletingType = null, deletingId = null;

/* ═══════════════════════════
   HELPERS
   ═══════════════════════════ */
const getRoundsOf = qid => rounds.filter(r => r.quarterId === qid).sort((a,b) => a.order - b.order);
const getPoemsOf = rid => poems.filter(p => p.roundId === rid).sort((a,b) => a.order - b.order);
const getQuarter = id => quarters.find(q => q.id === id);
const getFreeOf = qid => freePoems.filter(f => f.quarterId === qid).sort((a,b) => a.order - b.order);
const getRound = id => rounds.find(r => r.id === id);

/* ═══════════════════════════
   LOAD
   ═══════════════════════════ */
async function loadAll() {
  // 1단계: 스냅샷 있으면 즉시 렌더 (Firebase 기다리지 않고 바로 표시)
  const snap = loadSnapshot();
  if (snap && snap.quarters && snap.quarters.length) {
    quarters  = snap.quarters;
    rounds    = snap.rounds    || [];
    poems     = snap.poems     || [];
    freePoems = snap.freePoems || [];
    renderAll();
    hideLoading();
  }

  // 2단계: Firebase에서 최신 데이터 로드
  if (firebaseReady) {
    try {
      const [qs, rs, ps, fs] = await Promise.all([
        db.collection('quarters').orderBy('order').get(),
        db.collection('rounds').orderBy('order').get(),
        db.collection('poems').orderBy('order').get(),
        db.collection('freePoems').orderBy('order').get(),
      ]);
      quarters  = qs.docs.map(d => ({ id:d.id, ...d.data() }));
      rounds    = rs.docs.map(d => ({ id:d.id, ...d.data() }));
      poems     = ps.docs.map(d => ({ id:d.id, ...d.data() }));
      freePoems = fs.docs.map(d => ({ id:d.id, ...d.data() }));
      if (!quarters.length && !snap) useSample();
      saveSnapshot(); // 최신 데이터 로컬에 저장
      renderAll();
    } catch(e) {
      console.warn('Firestore 읽기 실패', e);
      if (!snap) useSample();
    }
  } else {
    if (!snap) useSample();
  }

  // 스냅샷 없었을 때만 여기서 렌더+로딩해제
  if (!snap || !snap.quarters || !snap.quarters.length) {
    renderAll();
    hideLoading();
  }
}

function useSample() {

function getQuarterPoets(q) {

/* ═══════════════════════════
   RENDER TOC
   ═══════════════════════════ */
function renderToc() {
  let html = '';
  quarters.forEach((q, qi) => {
    const qRounds = getRoundsOf(q.id);
    const hasPoems = qRounds.some(r => getPoemsOf(r.id).length);
    if (!hasPoems) return;
    html += `<div class="toc-quarter">
      <div class="toc-quarter-label">
        <span class="toc-quarter-num">${qi+1}분기</span>${q.title}
      </div>`;
    qRounds.forEach(r => {
      const rPoems = getPoemsOf(r.id);
      if (!rPoems.length) return;
      html += `<div class="toc-round"><div class="toc-round-label">${r.num}회차 — ${r.title}</div>`;
      rPoems.forEach(p => {
        html += `<div class="toc-item" onclick="jumpTo('${p.id}')">
          <span class="toc-item-title">${p.title}</span>
          <span class="toc-item-poet">${p.poet}</span>
        </div>`;
      });
      html += `</div>`;
    });
    // 자유시
    const fPoems = getFreeOf(q.id);
    if (fPoems.length) {
      html += `<div class='toc-round'><div class='toc-free-label'>자유시</div>`;
      fPoems.forEach(p => {
        html += `<div class='toc-item' onclick='jumpToFree("${p.id}")'>
          <span class='toc-item-title'>${p.title}</span>
          <span class='toc-item-poet'>${p.poet}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('toc-body').innerHTML = html ||
    `<div class="empty-state">아직 등록된 내용이 없어요.<br>편집 모드에서 분기와 회차를 먼저 만들어보세요.</div>`;
}

/* ═══════════════════════════
   RENDER BOOK
   ═══════════════════════════ */
/* 페이지 데이터 배열 (page-view용) */
let pageItems = [];

function buildPageItems() {
  pageItems = [];
  quarters.forEach((q, qi) => {
    const qRounds = getRoundsOf(q.id);
    const fPoems = getFreeOf(q.id);
    const hasContent = qRounds.some(r=>getPoemsOf(r.id).length) || fPoems.length;
    if (!hasContent) return;
    pageItems.push({ type:'quarter', q, qi });
    if (q.intro && q.intro.trim()) pageItems.push({ type:'intro', q });
    qRounds.forEach(r => {
      const rPoems = getPoemsOf(r.id);
      if (!rPoems.length) return;
      pageItems.push({ type:'round', r, q });
      rPoems.forEach(p => pageItems.push({ type:'poem', p, r }));
    });
    if (fPoems.length) {
      pageItems.push({ type:'free-section', q });
      fPoems.forEach(p => pageItems.push({ type:'free', p, q }));
    }
  });
}

function renderBook() {
  let html = '';
  quarters.forEach((q, qi) => {
    const qRounds = getRoundsOf(q.id);
    const fPoems = getFreeOf(q.id);
    const hasContent = qRounds.some(r=>getPoemsOf(r.id).length) || fPoems.length;
    if (!hasContent) return;
    html += `<div class="quarter-page" data-type="quarter" data-id="${q.id}">
      <div class="quarter-page-num">${qi+1}분기</div>
      <div class="quarter-page-title">${q.title}</div>
    </div>`;
    if (q.intro && q.intro.trim()) {
      html += `<div class="quarter-intro"><div class="quarter-intro-body">${q.intro}</div></div>`;
    }
    qRounds.forEach(r => {
      const rPoems = getPoemsOf(r.id);
      if (!rPoems.length) return;
      html += `<div class="round-page" data-type="round" data-id="${r.id}">
        <div class="round-page-num">${r.num}회차</div>
        <div class="round-page-title">${r.title}</div>
      </div>`;
      rPoems.forEach(p => {
        html += `<div class="poem-entry" data-type="poem" data-id="${p.id}" data-round="${r.id}">
          <div class="poem-entry-poet">${p.poet}</div>
          <div class="poem-entry-title">${p.title}</div>
          <div class="poem-entry-divider"></div>
          <div class="poem-entry-body">${p.body}</div>
        </div>`;
      });
    });
    if (fPoems.length) {
      html += `<div class="free-section-page" data-type="free-section" data-id="${q.id}">
        <div class="free-section-page-label">자유시</div>
        <div class="free-section-page-title">${q.title}의 자유시</div>
      </div>`;
      fPoems.forEach(p => {
        html += `<div class="poem-entry" data-type="free" data-id="${p.id}" data-quarter="${q.id}">
          <div class="poem-entry-poet">${p.poet}</div>
          <div class="poem-entry-title">${p.title}</div>
          <div class="poem-entry-divider"></div>
          <div class="poem-entry-body">${p.body}</div>
        </div>`;
      });
    }
  });
  document.getElementById('book-body').innerHTML = html ||
    `<div class="empty-state" style="min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">아직 등록된 시가 없어요.</div>`;
  buildPageItems();
}

/* ═══════════════════════════
   VIEW
   ═══════════════════════════ */
let viewMode = 'scroll'; // 'scroll' | 'page'
let currentPageIdx = 0;

function setViewMode(mode) {
  viewMode = mode;
  ['vt-scroll','vt-scroll2'].forEach(id => { const el=document.getElementById(id); if(el) el.classList.toggle('active', mode==='scroll'); });
  ['vt-page','vt-page2'].forEach(id => { const el=document.getElementById(id); if(el) el.classList.toggle('active', mode==='page'); });
  if (mode === 'scroll') {
    document.getElementById('book-view').classList.add('active');
    document.getElementById('page-view').classList.remove('active');
    updateNav();
  } else {
    document.getElementById('book-view').classList.remove('active');
    document.getElementById('page-view').classList.add('active');
    buildPageItems();
    currentPageIdx = 0;
    renderPageCard();
  }
}

function showView(name) {
  document.getElementById('cover').style.display = 'none';
  ['toc-view','book-view','page-view','gallery-view','edit-panel'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('bottom-nav').classList.remove('active');
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));

  if (name === 'cover') {
    document.getElementById('cover').style.display = 'flex';
  } else if (name === 'toc') {
    document.getElementById('toc-view').classList.add('active');
    document.getElementById('toc-btn').classList.add('active');
  } else if (name === 'book') {
    document.getElementById('read-btn').classList.add('active');
    document.getElementById('bottom-nav').classList.add('active');
    if (viewMode === 'scroll') {
      document.getElementById('book-view').classList.add('active');
      updateNav();
    } else {
      document.getElementById('page-view').classList.add('active');
      buildPageItems();
      renderPageCard();
    }
  } else if (name === 'gallery') {
    document.getElementById('gallery-view').classList.add('active');
    document.getElementById('gallery-btn').classList.add('active');
  } else if (name === 'edit') {
    document.getElementById('edit-panel').classList.add('active');
    document.getElementById('edit-btn').classList.add('active');
    renderEditAll();
  }

  currentView = name;
  if (name !== 'book' || viewMode !== 'page') window.scrollTo({ top:0 });
}
function showToc() { showView('toc'); }
function showBook() { showView('book'); }
function showGallery(){ showView('gallery'); }

/* ── PAGE VIEW ─────────────────────── */
function renderPageCard(dir) {
  const container = document.getElementById('page-card-container');
  if (!pageItems.length) {
    container.innerHTML = '<div class="page-card"><div class="page-card-type">아직 등록된 시가 없어요.</div></div>';
    updateNav(); return;
  }
  const item = pageItems[currentPageIdx];
  let inner = '';
  if (item.type === 'quarter') {
    const qi = pageItems.filter((x,i)=>i<=currentPageIdx && x.type==='quarter').length;
    inner = `<div class="page-card-quarter-num">${qi}분기</div>
      <div class="page-card-quarter-title">${item.q.title}</div>`;
  } else if (item.type === 'intro') {
    inner = `<div class="page-card-type">소개글</div>
      <div class="page-card-intro">${item.q.intro}</div>`;
  } else if (item.type === 'round') {
    inner = `<div class="page-card-round-num">${item.r.num}회차</div>
      <div class="page-card-round-title">${item.r.title}</div>`;
  } else if (item.type === 'poem' || item.type === 'free') {
    const label = item.type==='free' ? '자유시' : (item.r ? item.r.title : '');
    inner = `<div class="page-card-type">${label}</div>
      <div class="page-card-poet">${item.p.poet}</div>
      <div class="page-card-title">${item.p.title}</div>
      <div class="page-card-divider"></div>
      <div class="page-card-body">${item.p.body}</div>`;
  } else if (item.type === 'free-section') {
    inner = `<div class="page-card-round-num">자유시</div>
      <div class="page-card-round-title">${item.q.title}의 자유시</div>`;
  }

  container.innerHTML = `<div class="page-card">${inner}</div>`;
  updateNav();
}

function prevSection() {
  if (viewMode === 'page') {
    if (currentPageIdx <= 0) return;
    currentPageIdx--;
    renderPageCard('right');
  } else {
    const els = getNavEls(), idx = getCurrentIdx();
    if (idx > 0) doFlip(() => scrollToEl(els[idx-1]));
  }
}
function nextSection() {
  if (viewMode === 'page') {
    if (currentPageIdx >= pageItems.length-1) return;
    currentPageIdx++;
    renderPageCard('left');
  } else {
    const els = getNavEls(), idx = getCurrentIdx();
    if (idx < els.length-1) doFlip(() => scrollToEl(els[idx+1]));
  }
}

/* EDIT TABS */
function switchTab(name) {
  activeTab = name;
  const tabs = ['quarters','rounds','poems','free','gallery'];
  document.querySelectorAll('.edit-tab').forEach((t,i) => t.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.edit-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

/* ═══════════════════════════
   NAVIGATION
   ═══════════════════════════ */
function getNavEls() {
  return [...document.querySelectorAll('.quarter-page,.round-page,.poem-entry,.free-section-page')];
}
function getCurrentIdx() {
  const els = getNavEls(), scrollY = window.scrollY + 120;
  let idx = 0;
  els.forEach((el,i) => { if (el.offsetTop <= scrollY) idx = i; });
  return idx;
}
function updateNav() {
  if (viewMode === 'page') {
    document.getElementById('prev-btn').disabled = currentPageIdx <= 0;
    document.getElementById('next-btn').disabled = currentPageIdx >= pageItems.length - 1;
    const indicator = document.getElementById('page-indicator');
    if (pageItems.length) {
      indicator.innerHTML = `<span class="page-counter">${currentPageIdx+1} / ${pageItems.length}</span>`;
    }
    return;
  }
  const els = getNavEls(), idx = getCurrentIdx();
  document.getElementById('prev-btn').disabled = idx <= 0;
  document.getElementById('next-btn').disabled = idx >= els.length - 1;
  const el = els[idx];
  if (!el) return;
  if (el.dataset.type === 'quarter') {
    const q = getQuarter(el.dataset.id);
    document.getElementById('page-indicator').textContent = q ? q.title : '';
  } else if (el.dataset.type === 'round') {
    const r = getRound(el.dataset.id);
    document.getElementById('page-indicator').textContent = r ? `${r.num}회차 — ${r.title}` : '';
  } else if (el.dataset.type === 'free-section') {
    const q = getQuarter(el.dataset.id);
    document.getElementById('page-indicator').textContent = q ? q.title + ' 자유시' : '';
  } else if (el.dataset.type === 'free') {
    const q = getQuarter(el.dataset.quarter);
    document.getElementById('page-indicator').textContent = q ? q.title + ' 자유시' : '';
  } else {
    const r = getRound(el.dataset.round);
    document.getElementById('page-indicator').textContent = r ? r.title : '';
  }
}


function scrollToEl(el) {
  window.scrollTo({ top: Math.max(0, el.offsetTop - 58), behavior:'smooth' });
}
function jumpTo(poemId) {
  showView('book');
  setTimeout(() => {
    const el = document.querySelector(`.poem-entry[data-id="${poemId}"]`);
    if (el) { scrollToEl(el); updateNav(); }
  }, 100);
}

function jumpToFree(freeId) {
  showView('book');
  setTimeout(() => {
    const el = document.querySelector();
    if (el) { scrollToEl(el); updateNav(); }
  }, 100);
}
function jumpToFree(freeId) {
  showView('book');
  setTimeout(() => {
    if (viewMode === 'page') {
      const idx = pageItems.findIndex(item => item.type==='free' && item.p && item.p.id===freeId);
      if (idx>=0) { currentPageIdx=idx; renderPageCard(); }
    } else {
      const el = document.querySelector('[data-type="free"][data-id="'+freeId+'"]');
      if (el) { scrollToEl(el); updateNav(); }
    }
  }, 100);
}
window.addEventListener('scroll', () => { if (currentView==='book') updateNav(); }, { passive:true });

/* SWIPE */
let tx=0, ty=0;
document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, { passive:true });
document.addEventListener('touchend', e => {
  if (currentView!=='book') return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (viewMode==='page') {
    if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>35) { dx<0?nextSection():prevSection(); }
  } else {
    if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>45) { dx<0?nextSection():prevSection(); }
  }
}, { passive:true });

/* KEYBOARD */
document.addEventListener('keydown', e => {
  if (currentView!=='book'||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') nextSection();
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp') prevSection();
});

/* FLIP */
function doFlip(cb) {
  const s = document.getElementById('flip-sheet');
  s.style.transition='none'; s.style.opacity='0.45'; s.style.transform='rotateY(0deg)';
  requestAnimationFrame(() => {
    s.style.transition='transform 0.38s cubic-bezier(0.645,0.045,0.355,1),opacity 0.38s';
    s.style.transform='rotateY(-90deg)'; s.style.opacity='0';
    setTimeout(() => { cb&&cb(); }, 400);
  });
}

/* ═══════════════════════════
   분기 CRUD
   ═══════════════════════════ */
function openQuarterModal(id) {
  editingQuarterId = id || null;
  document.getElementById('quarter-modal-title').textContent = id ? '분기 수정' : '분기 추가';
  const q = id ? getQuarter(id) : null;
  document.getElementById('q-title').value = q ? q.title : '';
  document.getElementById('q-intro').value = q ? (q.intro||'') : '';
  document.getElementById('q-order').value = q ? q.order : quarters.length;
  document.getElementById('quarter-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('q-title').focus(), 100);
}
function closeQuarterModal() { document.getElementById('quarter-modal').classList.add('hidden'); editingQuarterId=null; }
async function saveQuarter() {
  const title = document.getElementById('q-title').value.trim();
  const intro = document.getElementById('q-intro').value.trim();
  const order = parseInt(document.getElementById('q-order').value)||0;
  if (!title) { alert('대주제를 입력해주세요.'); return; }
  const data = { title, intro, order };
  if (firebaseReady) {
    try {
      if (editingQuarterId) await db.collection('quarters').doc(editingQuarterId).update(data);
      else await db.collection('quarters').add(data);
      closeQuarterModal(); await loadAll(); return;
    } catch(e) { alert('저장 실패: Firebase 설정을 확인해주세요.'); return; }
  }
  if (editingQuarterId) { const i=quarters.findIndex(q=>q.id===editingQuarterId); if(i>=0) quarters[i]={...quarters[i],...data}; }
  else quarters.push({ id:'q_'+Date.now(), ...data });
  closeQuarterModal(); renderAll();
}

/* ═══════════════════════════
   회차 CRUD
   ═══════════════════════════ */
function fillQuarterSelect(selId, selectedId) {
  document.getElementById(selId).innerHTML = quarters
    .map(q => `<option value="${q.id}" ${q.id===selectedId?'selected':''}>${q.title}</option>`).join('');
}
function openRoundModal(id) {
  if (!quarters.length) { alert('분기를 먼저 만들어주세요.'); return; }
  editingRoundId = id || null;
  document.getElementById('round-modal-title').textContent = id ? '회차 수정' : '회차 추가';
  const r = id ? getRound(id) : null;
  fillQuarterSelect('r-quarter', r ? r.quarterId : quarters[0].id);
  document.getElementById('r-num').value = r ? r.num : rounds.length+1;
  document.getElementById('r-title').value = r ? r.title : '';
  document.getElementById('r-order').value = r ? r.order : rounds.length;
  document.getElementById('round-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('r-title').focus(), 100);
}
function closeRoundModal() { document.getElementById('round-modal').classList.add('hidden'); editingRoundId=null; }
async function saveRound() {
  const quarterId = document.getElementById('r-quarter').value;
  const num = parseInt(document.getElementById('r-num').value)||1;
  const title = document.getElementById('r-title').value.trim();
  const order = parseInt(document.getElementById('r-order').value)||0;
  if (!title) { alert('회차 시제를 입력해주세요.'); return; }
  const data = { quarterId, num, title, order };
  if (firebaseReady) {
    try {
      if (editingRoundId) await db.collection('rounds').doc(editingRoundId).update(data);
      else await db.collection('rounds').add(data);
      closeRoundModal(); await loadAll(); return;
    } catch(e) { alert('저장 실패'); return; }
  }
  if (editingRoundId) { const i=rounds.findIndex(r=>r.id===editingRoundId); if(i>=0) rounds[i]={...rounds[i],...data}; }
  else rounds.push({ id:'r_'+Date.now(), ...data });
  closeRoundModal(); renderAll();
}

/* ═══════════════════════════
   시 CRUD
   ═══════════════════════════ */
function fillRoundSelect(selId, selectedId) {
  document.getElementById(selId).innerHTML = quarters.map(q => {
    const qr = getRoundsOf(q.id);
    if (!qr.length) return '';
    return `<optgroup label="${q.title}">` +
      qr.map(r => `<option value="${r.id}" ${r.id===selectedId?'selected':''}>${r.num}회차 — ${r.title}</option>`).join('') +
      `</optgroup>`;
  }).join('');
}
function openPoemModal(id) {
  if (!rounds.length) { alert('회차를 먼저 만들어주세요.'); return; }
  editingPoemId = id || null;
  editingFreePoemId = null;
  document.getElementById('poem-modal-title').textContent = id ? '시 수정' : '시 추가';
  document.getElementById('p-type').value = 'round';
  togglePoemType();
  const p = id ? poems.find(x=>x.id===id) : null;
  fillRoundSelect('p-round', p ? p.roundId : rounds[0].id);
  document.getElementById('p-poet').value = p ? p.poet : '';
  document.getElementById('p-title').value = p ? p.title : '';
  document.getElementById('p-body').value = p ? p.body : '';
  document.getElementById('p-order').value = p ? p.order : poems.length;
  document.getElementById('poem-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('p-poet').focus(), 100);
}
function closePoemModal() { document.getElementById('poem-modal').classList.add('hidden'); editingPoemId=null; }
async function savePoem() {
  const roundId = document.getElementById('p-round').value;
  const poet = document.getElementById('p-poet').value.trim();
  const title = document.getElementById('p-title').value.trim();
  const body = document.getElementById('p-body').value;
  const order = parseInt(document.getElementById('p-order').value)||0;
  const ptype = document.getElementById('p-type').value;
  if (!poet||!title||!body) { alert('시인, 제목, 본문은 필수입니다.'); return; }
  if (ptype==='free') {
    const quarterId = document.getElementById('p-quarter-free').value;
    const data = { quarterId, poet, title, body, order };
    if (firebaseReady) {
      try {
        if (editingFreePoemId) await db.collection('freePoems').doc(editingFreePoemId).update(data);
        else await db.collection('freePoems').add(data);
        closePoemModal(); await loadAll(); return;
      } catch(e) { alert('저장 실패'); return; }
    }
    if (editingFreePoemId) { const i=freePoems.findIndex(p=>p.id===editingFreePoemId); if(i>=0) freePoems[i]={...freePoems[i],...data}; }
    else freePoems.push({ id:'f_'+Date.now(), ...data });
    closePoemModal(); renderAll(); return;
  }
  const data = { roundId, poet, title, body, order };
  if (firebaseReady) {
    try {
      if (editingPoemId) await db.collection('poems').doc(editingPoemId).update(data);
      else await db.collection('poems').add(data);
      closePoemModal(); await loadAll(); return;
    } catch(e) { alert('저장 실패'); return; }
  }
  if (editingPoemId) { const i=poems.findIndex(p=>p.id===editingPoemId); if(i>=0) poems[i]={...poems[i],...data}; }
  else poems.push({ id:'p_'+Date.now(), ...data });
  closePoemModal(); renderAll();
}

/* ═══════════════════════════
   DELETE
   ═══════════════════════════ */
function openDelModal(type, id, name) {
  deletingType=type; deletingId=id;
  document.getElementById('del-target-name').textContent = name;
  document.getElementById('del-modal').classList.remove('hidden');
}
function closeDelModal() { document.getElementById('del-modal').classList.add('hidden'); deletingType=null; deletingId=null; }
async function confirmDelete() {
  if (!deletingId) return;
  const col = deletingType==='quarter'?'quarters':deletingType==='round'?'rounds':deletingType==='freePoem'?'freePoems':deletingType==='gallery'?'gallery':'poems';
  if (firebaseReady) {
    try { await db.collection(col).doc(deletingId).delete(); closeDelModal(); await loadAll(); return; }
    catch(e) { alert('삭제 실패'); return; }
  }
  if (deletingType==='quarter') quarters = quarters.filter(q=>q.id!==deletingId);
  else if (deletingType==='round') rounds = rounds.filter(r=>r.id!==deletingId);
  else if (deletingType==='freePoem') freePoems = freePoems.filter(p=>p.id!==deletingId);
  else if (deletingType==='gallery') galleryItems = galleryItems.filter(g=>g.id!==deletingId);
  else poems = poems.filter(p=>p.id!==deletingId);
  closeDelModal(); renderAll();
}

/* ═══════════════════════════
   자유시 CRUD
   ═══════════════════════════ */
let editingFreePoemId = null;

function togglePoemType() {
  const type = document.getElementById('p-type').value;
  document.getElementById('p-round-group').style.display = type==='round' ? '' : 'none';
  document.getElementById('p-quarter-group').style.display = type==='free' ? '' : 'none';
}

function fillQuarterFreeSelect(selId, selectedId) {
  document.getElementById(selId).innerHTML = quarters
    .map(q => '<option value="'+q.id+'" '+(q.id===selectedId?'selected':'')+'>'+q.title+'</option>').join('');
}

function openFreePoemModal(id) {
  if (!quarters.length) { alert('분기를 먼저 만들어주세요.'); return; }
  editingFreePoemId = id || null;
  document.getElementById('poem-modal-title').textContent = id ? '자유시 수정' : '자유시 추가';
  const p = id ? freePoems.find(x=>x.id===id) : null;
  document.getElementById('p-type').value = 'free';
  togglePoemType();
  fillQuarterFreeSelect('p-quarter-free', p ? p.quarterId : quarters[0].id);
  document.getElementById('p-poet').value = p ? p.poet : '';
  document.getElementById('p-title').value = p ? p.title : '';
  document.getElementById('p-body').value = p ? p.body : '';
  document.getElementById('p-order').value = p ? p.order : freePoems.length;
  document.getElementById('poem-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('p-poet').focus(), 100);
}

function renderFreeEdit() {
  const body = document.getElementById('free-body');
  if (!freePoems.length) {
    body.innerHTML = '<div class="empty-state">자유시가 없어요.</div>'; return;
  }
  let html = '';
  quarters.forEach(q => {
    const qFree = getFreeOf(q.id);
    if (!qFree.length) return;
    html += '<div class="edit-group"><div class="edit-group-label"><span>'+q.title+'</span> 자유시</div>';
    qFree.forEach(p => {
      const safeTitle = p.title.replace(/'/g, "\'");
      html += '<div class="edit-card"><div class="edit-card-info">'
        + '<div class="edit-card-title">'+p.title+'</div>'
        + '<div class="edit-card-sub">'+p.poet+'</div>'
        + '<div class="edit-card-preview">'+p.body.replace(/\n/g,' ')+'</div>'
        + '</div><div class="edit-card-actions">'
        + '<button class="ecard-btn" onclick="openFreePoemModal(\''+p.id+'\')">수정</button>'
        + '<button class="ecard-btn del" onclick="openDelModal(\'freePoem\',\''+p.id+'\',\''+safeTitle+'\')">삭제</button>'
        + '</div></div>';
    });
    html += '</div>';
  });
  body.innerHTML = html || '<div class="empty-state">등록된 자유시가 없어요.</div>';
}

/* ═══════════════════════════
   갤러리 RENDER
   ═══════════════════════════ */
const TYPE_LABEL = { illust:'시 삽화', bg:'배경 삽화', etc:'기타' };
const TYPE_BADGE = { illust:'badge-illust', bg:'badge-bg', etc:'badge-etc' };

function getGalleryOf(qid) {
  return galleryItems.filter(g => g.quarterId === qid).sort((a,b) => a.order - b.order);
}

function renderGallery() {
  const body = document.getElementById('gallery-body');
  if (!body) return;
  if (!galleryItems.length) {
    body.innerHTML = '<div class="empty-state" style="min-height:40vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">아직 등록된 이미지가 없어요.<br>편집 모드 → 갤러리 탭에서 추가하세요.</div>';
    return;
  }
  let html = '';
  quarters.forEach((q, qi) => {
    const gItems = getGalleryOf(q.id);
    if (!gItems.length) return;
    html += '<div class="gallery-quarter">'
      + '<div class="gallery-quarter-label">' + (qi+1) + '분기 — ' + q.title + '</div>'
      + '<div class="gallery-grid">';
    gItems.forEach(g => {
      const badge = TYPE_BADGE[g.type] || 'badge-etc';
      const label = TYPE_LABEL[g.type] || '기타';
      const gid = g.id;
      const imgHtml = g.imageUrl
        ? '<div class="gallery-card-img"><img src="' + g.imageUrl + '" alt="' + g.title + '" loading="lazy"></div>'
        : '<div class="gallery-card-img-placeholder">이미지 없음</div>';
      const noteHtml = g.note ? '<div class="gallery-card-note">' + g.note + '</div>' : '';
      html += '<div class="gallery-card" onclick="openLightbox(\'' + gid + '\')">'
        + imgHtml
        + '<div class="gallery-card-body">'
        + '<span class="gallery-type-badge ' + badge + '">' + label + '</span>'
        + '<div class="gallery-card-title">' + g.title + '</div>'
        + noteHtml
        + '</div></div>';
      });
    html += '</div></div>';
  });
  body.innerHTML = html || '<div class="empty-state">이미지가 없어요.</div>';
}

function openLightbox(id) {
  const g = galleryItems.find(x => x.id === id);
  if (!g) return;
  const lb = document.getElementById('gallery-lightbox');
  const img = document.getElementById('lb-img');
  if (g.imageUrl) { img.src = g.imageUrl; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
  document.getElementById('lb-title').textContent = g.title;
  document.getElementById('lb-tag').textContent = TYPE_LABEL[g.type] || '';
  document.getElementById('lb-note').textContent = g.note || '';
  lb.classList.add('active');
}
function closeLightbox() { document.getElementById('gallery-lightbox').classList.remove('active'); }

function renderGalleryEdit() {
  const body = document.getElementById('gallery-edit-body');
  if (!body) return;
  if (!galleryItems.length) {
    body.innerHTML = '<div class="empty-state">갤러리 이미지가 없어요. + 이미지 추가로 시작하세요.</div>'; return;
  }
  let html = '';
  quarters.forEach(q => {
    const gItems = getGalleryOf(q.id);
    if (!gItems.length) return;
    html += '<div class="edit-group"><div class="edit-group-label"><span>' + q.title + '</span> 갤러리</div>';
    gItems.forEach(g => {
      const label = TYPE_LABEL[g.type] || '기타';
      const safeTitle = g.title.replace(/'/g, "\'");
      const gid = g.id;
      html += '<div class="edit-card">'
        + '<div class="edit-card-info">'
        + '<div class="edit-card-title">' + g.title + '</div>'
        + '<div class="edit-card-sub">' + label + '</div>'
        + (g.note ? '<div class="edit-card-preview">' + g.note + '</div>' : '')
        + '</div><div class="edit-card-actions">'
        + '<button class="ecard-btn" onclick="openGalleryModal(\'' + gid + '\')">수정</button>'
        + '<button class="ecard-btn del" onclick="openDelModal(\'gallery\',\'' + gid + '\',\'' + safeTitle + '\')">삭제</button>'
        + '</div></div>';
    });
    html += '</div>';
  });
  body.innerHTML = html || '<div class="empty-state">등록된 이미지가 없어요.</div>';
}

/* ═══════════════════════════
   갤러리 CRUD
   ═══════════════════════════ */
let editingGalleryId = null;

function fillGalleryQuarterSelect(selectedId) {
  document.getElementById('g-quarter').innerHTML = quarters
    .map(q => '<option value="' + q.id + '"' + (q.id===selectedId?' selected':'') + '>' + q.title + '</option>').join('');
}

function openGalleryModal(id) {
  if (!quarters.length) { alert('분기를 먼저 만들어주세요.'); return; }
  editingGalleryId = id || null;
  document.getElementById('gallery-modal-title').textContent = id ? '이미지 수정' : '이미지 추가';
  const g = id ? galleryItems.find(x=>x.id===id) : null;
  fillGalleryQuarterSelect(g ? g.quarterId : quarters[0].id);
  document.getElementById('g-title').value  = g ? g.title  : '';
  document.getElementById('g-type').value   = g ? (g.type||'illust') : 'illust';
  document.getElementById('g-note').value   = g ? (g.note||'')  : '';
  document.getElementById('g-url').value    = g ? (g.imageUrl||'') : '';
  document.getElementById('g-order').value  = g ? g.order  : galleryItems.length;
  document.getElementById('g-progress').textContent = '';
  document.getElementById('g-file').value   = '';
  document.getElementById('gallery-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('g-title').focus(), 100);
}
function closeGalleryModal() { document.getElementById('gallery-modal').classList.add('hidden'); editingGalleryId=null; }

async function saveGalleryItem() {
  const quarterId = document.getElementById('g-quarter').value;
  const title  = document.getElementById('g-title').value.trim();
  const type   = document.getElementById('g-type').value;
  const note   = document.getElementById('g-note').value.trim();
  const order  = parseInt(document.getElementById('g-order').value)||0;
  const file   = document.getElementById('g-file').files[0];
  let imageUrl = document.getElementById('g-url').value.trim();
  if (!title) { alert('제목을 입력해주세요.'); return; }

  const btn = document.getElementById('g-save-btn');
  btn.disabled = true;

  // 파일 업로드
  if (file && storage) {
    try {
      document.getElementById('g-progress').textContent = '업로드 중...';
      const ref = storage.ref('gallery/' + Date.now() + '_' + file.name);
      const snap = await ref.put(file);
      imageUrl = await snap.ref.getDownloadURL();
      document.getElementById('g-progress').textContent = '업로드 완료!';
    } catch(e) {
      alert('이미지 업로드 실패: ' + e.message);
      btn.disabled = false; return;
    }
  }

  const data = { quarterId, title, type, note, order, imageUrl };

  if (firebaseReady) {
    try {
      if (editingGalleryId) await db.collection('gallery').doc(editingGalleryId).update(data);
      else await db.collection('gallery').add(data);
      closeGalleryModal(); btn.disabled=false; await loadAll(); return;
    } catch(e) { alert('저장 실패: ' + e.message); btn.disabled=false; return; }
  }
  if (editingGalleryId) { const i=galleryItems.findIndex(g=>g.id===editingGalleryId); if(i>=0) galleryItems[i]={...galleryItems[i],...data}; }
  else galleryItems.push({ id:'g_'+Date.now(), ...data });
  closeGalleryModal(); btn.disabled=false; renderAll();
}

/* ═══════════════════════════
   LOADING / INIT
   ═══════════════════════════ */
function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => el.style.display='none', 700);
}

document.getElementById('cover').style.display = 'flex';
loadAll();
